<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatznBox</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            color: #1c1b1f;
            height: 100vh;
            overflow: hidden;
        }

        /* Top bar */
        .topbar {
            background: linear-gradient(135deg, #00897B, #43A047);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 { font-size: 22px; }
        .topbar .now-playing { font-size: 13px; opacity: 0.9; }

        /* Three-panel layout */
        .panels {
            display: flex;
            height: calc(100vh - 50px);
        }

        /* Left panel — Songs & Playlists */
        .panel-left {
            flex: 1;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-box {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .search-box input:focus { border-color: #00897B; }

        .playlist-chips {
            display: flex;
            gap: 4px;
            padding: 8px 10px;
            overflow-x: auto;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .chip {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid #00897B;
            color: #00897B;
            background: white;
        }
        .chip.active { background: #00897B; color: white; }
        .chip:hover { background: #E0F2F1; }
        .chip.active:hover { background: #00796B; }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .song-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .song-item:hover { background: #E0F2F1; }
        .song-item.active { background: #00897B; color: white; }
        .song-item.active:hover { background: #00796B; }
        .song-item .song-name { flex: 1; }
        .song-item .song-playlists { font-size: 10px; color: #00897B; }
        .song-item.active .song-playlists { color: #B2DFDB; }
        .song-count { padding: 6px 12px; font-size: 11px; color: #999; }

        /* Middle panel — Player */
        .panel-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
        }
        .player-title {
            font-size: 20px;
            font-weight: 600;
            color: #00897B;
            margin-bottom: 4px;
        }
        .loading { font-size: 13px; color: #999; margin-bottom: 8px; }

        .seek-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }
        .seek-row input[type="range"] { flex: 1; accent-color: #00897B; }
        .time { font-size: 12px; color: #666; min-width: 40px; }

        .transport {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        .btn {
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .btn-play { width: 52px; height: 52px; background: #00897B; font-size: 20px; }
        .btn-stop { width: 36px; height: 36px; background: #888; font-size: 14px; }
        .btn:hover { opacity: 0.85; }

        .presets {
            display: flex;
            gap: 6px;
            margin: 8px 0;
        }
        .preset-btn {
            flex: 1;
            padding: 7px;
            border: 1px solid #00897B;
            border-radius: 8px;
            background: white;
            color: #00897B;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        .preset-btn:hover { background: #E0F2F1; }
        .preset-btn.active { background: #00897B; color: white; }

        /* Up next */
        .up-next {
            background: #E8F5E9;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            font-size: 13px;
        }
        .up-next .label { color: #666; font-size: 11px; margin-right: 8px; }
        .up-next .next-name { flex: 1; font-weight: 500; }
        .up-next .skip-btn {
            padding: 4px 10px;
            border: 1px solid #00897B;
            border-radius: 6px;
            background: white;
            color: #00897B;
            cursor: pointer;
            font-size: 11px;
        }

        /* Collapsible sections */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #eee;
            margin-top: 8px;
        }
        .section-content { padding: 6px 0; }

        .stem-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        .stem-name { font-size: 13px; font-weight: 500; min-width: 80px; }
        .stem-row input[type="range"] { flex: 1; accent-color: #00897B; }
        .stem-vol { font-size: 12px; min-width: 35px; text-align: right; color: #666; }

        /* Save setup */
        .save-row {
            display: flex;
            gap: 6px;
            margin: 8px 0;
        }
        .save-btn {
            padding: 6px 12px;
            border: 1px solid #00897B;
            border-radius: 6px;
            background: white;
            color: #00897B;
            cursor: pointer;
            font-size: 12px;
        }
        .save-btn:hover { background: #E0F2F1; }
        .preset-indicator {
            font-size: 11px;
            color: #00897B;
            padding: 4px 0;
        }

        /* Right panel — Lyrics */
        .panel-right {
            flex: 1;
            background: white;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        .lyrics-header {
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            color: #333;
        }
        .lyrics-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 16px;
            line-height: 28px;
            white-space: pre-wrap;
            color: #333;
        }
        .no-lyrics { color: #999; font-style: italic; font-size: 14px; }

        /* Empty state */
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>BeatznBox</h1>
        <span class="now-playing" id="nowPlaying">Select a song to start</span>
    </div>

    <div class="panels">
        <!-- Left: Songs & Playlists -->
        <div class="panel-left">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search songs..." oninput="filterSongs()">
            </div>
            <div class="playlist-chips" id="playlistChips"></div>
            <div class="song-count" id="songCount"></div>
            <div class="song-list" id="songList"></div>
        </div>

        <!-- Center: Player -->
        <div class="panel-center">
            <div id="playerContent">
                <div class="empty-state">Select a song from the left</div>
            </div>
        </div>

        <!-- Right: Lyrics -->
        <div class="panel-right">
            <div class="lyrics-header">Lyrics</div>
            <div class="lyrics-content" id="lyricsContent">
                <span class="no-lyrics">Select a song to view lyrics</span>
            </div>
        </div>
    </div>

    <script>
        const STEMS_BASE_URL = './stems';
        const STEM_NAMES = ['vocals', 'drums', 'bass', 'other'];

        let audioCtx = null;
        let stems = {};
        let gainNodes = {};
        let sourceNodes = {};
        let isPlaying = false;
        let wasPlayingBeforeSeek = false;
        let startTime = 0;
        let pauseOffset = 0;
        let songDuration = 0;
        let currentSongIndex = -1;
        let seekInterval = null;
        let isLoading = false;
        let songs = [];
        let filteredSongs = [];
        let currentPreset = 'karaoke';

        // Playlists (stored in localStorage)
        let playlists = JSON.parse(localStorage.getItem('beatznbox_playlists') || '{}');
        let selectedPlaylist = null;

        // Session presets (stored in localStorage)
        let sessionPresets = JSON.parse(localStorage.getItem('beatznbox_presets') || '{}');

        // ===== Song List =====

        async function loadSongList() {
            try {
                const resp = await fetch(STEMS_BASE_URL + '/songs.json');
                songs = await resp.json();
            } catch (e) { songs = []; }
            filteredSongs = [...songs];
            renderPlaylistChips();
            renderSongList();
        }

        function renderPlaylistChips() {
            const el = document.getElementById('playlistChips');
            let html = `<span class="chip ${selectedPlaylist === null ? 'active' : ''}" onclick="selectPlaylist(null)">All</span>`;
            for (const name of Object.keys(playlists)) {
                html += `<span class="chip ${selectedPlaylist === name ? 'active' : ''}" onclick="selectPlaylist('${name}')">${name}</span>`;
            }
            html += `<span class="chip" onclick="createPlaylist()">+</span>`;
            el.innerHTML = html;
        }

        function selectPlaylist(name) {
            selectedPlaylist = name;
            renderPlaylistChips();
            filterSongs();
        }

        function createPlaylist() {
            const name = prompt('New playlist name:');
            if (name && name.trim()) {
                playlists[name.trim()] = [];
                savePlaylists();
                renderPlaylistChips();
            }
        }

        function savePlaylists() {
            localStorage.setItem('beatznbox_playlists', JSON.stringify(playlists));
        }

        function filterSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let list = songs;

            if (selectedPlaylist) {
                const playlistSongs = playlists[selectedPlaylist] || [];
                list = playlistSongs.map(dir => songs.find(s => s.dir === dir)).filter(Boolean);
            }

            if (query) {
                list = list.filter(s => s.name.toLowerCase().includes(query));
            }

            filteredSongs = list;
            renderSongList();
        }

        function renderSongList() {
            const el = document.getElementById('songList');
            document.getElementById('songCount').textContent = `${filteredSongs.length} songs`;

            if (filteredSongs.length === 0) {
                el.innerHTML = '<div style="padding:20px;color:#999;text-align:center">No songs found</div>';
                return;
            }

            el.innerHTML = filteredSongs.map((song, i) => {
                const globalIdx = songs.indexOf(song);
                const isActive = globalIdx === currentSongIndex;
                const songPlaylists = Object.keys(playlists).filter(p => playlists[p].includes(song.dir));
                return `<div class="song-item ${isActive ? 'active' : ''}" onclick="selectSong(${globalIdx})">
                    <div style="flex:1">
                        <div class="song-name">${song.name}</div>
                        ${songPlaylists.length ? `<div class="song-playlists">${songPlaylists.join(', ')}</div>` : ''}
                    </div>
                    <span style="font-size:11px;cursor:pointer;padding:4px" onclick="event.stopPropagation();addToPlaylist(${globalIdx})">+P</span>
                </div>`;
            }).join('');
        }

        function addToPlaylist(songIdx) {
            const song = songs[songIdx];
            const names = Object.keys(playlists);
            if (names.length === 0) {
                createPlaylist();
                return;
            }
            const name = prompt('Add to playlist:\n' + names.join(', '));
            if (name && playlists[name] !== undefined) {
                if (!playlists[name].includes(song.dir)) {
                    playlists[name].push(song.dir);
                    savePlaylists();
                    renderSongList();
                }
            }
        }

        // ===== Player =====

        async function selectSong(index) {
            if (currentSongIndex === index) return;
            if (isLoading) return;

            // Fully stop and disconnect everything
            stopPlayback();
            for (const stem of STEM_NAMES) {
                if (gainNodes[stem]) {
                    gainNodes[stem].disconnect();
                    gainNodes[stem] = null;
                }
            }
            stems = {};
            sourceNodes = {};

            currentSongIndex = index;
            isLoading = true;
            const song = songs[index];

            document.getElementById('nowPlaying').textContent = song.name;
            renderSongList();

            document.getElementById('playerContent').innerHTML = `
                <div class="player-title">${song.name}</div>
                <div class="loading" id="loadingStatus">Loading stems...</div>
                <div class="seek-row">
                    <span class="time" id="currentTime">0:00</span>
                    <input type="range" id="seekBar" min="0" max="1000" value="0" oninput="seekTo(this.value)">
                    <span class="time" id="totalTime">0:00</span>
                </div>
                <div class="transport">
                    <button class="btn btn-stop" onclick="stopPlayback()">&#9632;</button>
                    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">&#9654;</button>
                </div>
                <div class="presets">
                    <button class="preset-btn" id="pre-karaoke" onclick="applyPreset('karaoke')">Karaoke</button>
                    <button class="preset-btn" id="pre-unplugged" onclick="applyPreset('unplugged')">Unplugged</button>
                    <button class="preset-btn" id="pre-jamming" onclick="applyPreset('jamming')">Jamming</button>
                </div>
                <div class="up-next" id="upNext" style="display:none">
                    <span class="label">Up next:</span>
                    <span class="next-name" id="nextSongName"></span>
                    <button class="skip-btn" onclick="playNext()">Skip</button>
                </div>
                <div class="section-header" onclick="toggleSection('mixer')">
                    <span>Stem Mixer</span><span id="mixerArrow">&#9650;</span>
                </div>
                <div class="section-content" id="mixerSection">
                    <div class="stem-row"><span class="stem-name">Vocals</span><input type="range" min="0" max="100" value="0" id="sl-vocals" oninput="setStemVol('vocals',this.value)"><span class="stem-vol" id="vol-vocals">0%</span></div>
                    <div class="stem-row"><span class="stem-name">Drums</span><input type="range" min="0" max="100" value="80" id="sl-drums" oninput="setStemVol('drums',this.value)"><span class="stem-vol" id="vol-drums">80%</span></div>
                    <div class="stem-row"><span class="stem-name">Bass</span><input type="range" min="0" max="100" value="80" id="sl-bass" oninput="setStemVol('bass',this.value)"><span class="stem-vol" id="vol-bass">80%</span></div>
                    <div class="stem-row"><span class="stem-name">Harmony</span><input type="range" min="0" max="100" value="80" id="sl-other" oninput="setStemVol('other',this.value)"><span class="stem-vol" id="vol-other">80%</span></div>
                </div>
                <div class="save-row">
                    <button class="save-btn" onclick="saveSetup()">Save Setup</button>
                    <button class="save-btn" onclick="clearSetup()" style="display:none" id="clearSetupBtn">Clear</button>
                </div>
                <div class="preset-indicator" id="presetIndicator"></div>
            `;

            // Show up next
            updateUpNext();

            // Init audio
            if (!audioCtx) audioCtx = new AudioContext();

            // Load stems
            let loaded = 0;
            for (const stem of STEM_NAMES) {
                try {
                    const url = `${STEMS_BASE_URL}/${song.dir}/${stem}.mp3`;
                    document.getElementById('loadingStatus').textContent = `Loading ${stem}... (${loaded}/${STEM_NAMES.length})`;
                    const resp = await fetch(url);
                    const buf = await resp.arrayBuffer();
                    stems[stem] = await audioCtx.decodeAudioData(buf);
                    loaded++;
                } catch (e) { console.warn(`Failed: ${stem}`, e); }
            }

            isLoading = false;

            if (loaded === 0) {
                document.getElementById('loadingStatus').textContent = 'Failed to load';
                return;
            }

            songDuration = Math.max(...Object.values(stems).map(b => b.duration));
            document.getElementById('loadingStatus').textContent = '';
            document.getElementById('totalTime').textContent = formatTime(songDuration);

            for (const stem of STEM_NAMES) {
                if (!gainNodes[stem]) {
                    gainNodes[stem] = audioCtx.createGain();
                    gainNodes[stem].connect(audioCtx.destination);
                }
            }

            // Restore session preset if available
            const presetKey = (selectedPlaylist || 'all') + '::' + song.dir;
            if (sessionPresets[presetKey]) {
                restoreSetup(sessionPresets[presetKey]);
            } else {
                applyPreset('karaoke');
            }

            // Load lyrics
            loadLyrics(song.dir);
        }

        async function loadLyrics(dir) {
            const el = document.getElementById('lyricsContent');
            try {
                const resp = await fetch(`${STEMS_BASE_URL}/${dir}/lyrics.txt`);
                if (resp.ok) {
                    el.textContent = await resp.text();
                    el.classList.remove('no-lyrics');
                } else {
                    el.innerHTML = '<span class="no-lyrics">No lyrics available</span>';
                }
            } catch (e) {
                el.innerHTML = '<span class="no-lyrics">No lyrics available</span>';
            }
        }

        function togglePlay() {
            if (isPlaying) pausePlayback();
            else startPlayback();
        }

        function startPlayback() {
            if (!audioCtx || Object.keys(stems).length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            for (const stem of STEM_NAMES) {
                if (!stems[stem]) continue;
                const src = audioCtx.createBufferSource();
                src.buffer = stems[stem];
                src.connect(gainNodes[stem]);
                src.start(0, pauseOffset);
                sourceNodes[stem] = src;
            }

            startTime = audioCtx.currentTime - pauseOffset;
            isPlaying = true;
            document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';
            seekInterval = setInterval(updateSeek, 200);

            // Auto-next on end — only if song actually finished naturally
            const firstStem = STEM_NAMES.find(s => sourceNodes[s]);
            if (firstStem) {
                const expectedEndSong = currentSongIndex;
                sourceNodes[firstStem].addEventListener('ended', () => {
                    if (isPlaying && currentSongIndex === expectedEndSong) {
                        const cur = audioCtx.currentTime - startTime;
                        // Only auto-next if we're actually near the end
                        if (cur >= songDuration - 1) {
                            stopPlayback();
                            playNext();
                        }
                    }
                });
            }
        }

        function pausePlayback() {
            if (!isPlaying) return;
            pauseOffset = audioCtx.currentTime - startTime;
            for (const stem of STEM_NAMES) {
                try { sourceNodes[stem]?.stop(); sourceNodes[stem]?.disconnect(); } catch (e) {}
            }
            sourceNodes = {};
            isPlaying = false;
            document.getElementById('playBtn').innerHTML = '&#9654;';
            clearInterval(seekInterval);
        }

        function stopPlayback() {
            if (isPlaying) {
                for (const stem of STEM_NAMES) {
                    try { sourceNodes[stem]?.stop(); sourceNodes[stem]?.disconnect(); } catch (e) {}
                }
                sourceNodes = {};
                isPlaying = false;
                clearInterval(seekInterval);
            }
            pauseOffset = 0;
            const seekBar = document.getElementById('seekBar');
            const curTime = document.getElementById('currentTime');
            const playBtn = document.getElementById('playBtn');
            if (seekBar) seekBar.value = 0;
            if (curTime) curTime.textContent = '0:00';
            if (playBtn) playBtn.innerHTML = '&#9654;';
        }

        function seekTo(val) {
            const frac = val / 1000;
            wasPlayingBeforeSeek = isPlaying;
            if (isPlaying) {
                // Stop sources without triggering auto-next
                for (const stem of STEM_NAMES) {
                    try { sourceNodes[stem]?.stop(); sourceNodes[stem]?.disconnect(); } catch (e) {}
                }
                sourceNodes = {};
                isPlaying = false;
                clearInterval(seekInterval);
            }
            pauseOffset = frac * songDuration;
            document.getElementById('currentTime').textContent = formatTime(pauseOffset);
            if (wasPlayingBeforeSeek) startPlayback();
        }

        function updateSeek() {
            if (!isPlaying || !songDuration) return;
            const cur = audioCtx.currentTime - startTime;
            document.getElementById('seekBar').value = (cur / songDuration) * 1000;
            document.getElementById('currentTime').textContent = formatTime(cur);
        }

        // ===== Stem Volume =====

        function setStemVol(stem, val) {
            const v = val / 100;
            if (gainNodes[stem]) gainNodes[stem].gain.value = v;
            const volEl = document.getElementById('vol-' + stem);
            if (volEl) volEl.textContent = v === 0 ? 'OFF' : Math.round(v * 100) + '%';
        }

        function applyPreset(name) {
            const presets = {
                karaoke:   { vocals: 0,  drums: 80, bass: 80, other: 80 },
                unplugged: { vocals: 0,  drums: 0,  bass: 80, other: 80 },
                jamming:   { vocals: 0,  drums: 70, bass: 80, other: 40 },
            };
            const p = presets[name];
            if (!p) return;
            currentPreset = name;
            for (const [stem, vol] of Object.entries(p)) {
                setStemVol(stem, vol);
                const sl = document.getElementById('sl-' + stem);
                if (sl) sl.value = vol;
            }
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('pre-' + name);
            if (btn) btn.classList.add('active');
        }

        // ===== Up Next =====

        function updateUpNext() {
            const el = document.getElementById('upNext');
            if (!el) return;
            const nextIdx = getNextSongIndex();
            if (nextIdx >= 0 && filteredSongs.length > 1) {
                el.style.display = 'flex';
                document.getElementById('nextSongName').textContent = songs[nextIdx].name;
            } else {
                el.style.display = 'none';
            }
        }

        function getNextSongIndex() {
            if (currentSongIndex < 0) return -1;
            const currentInFiltered = filteredSongs.indexOf(songs[currentSongIndex]);
            if (currentInFiltered < 0) return -1;
            const nextFiltered = (currentInFiltered + 1) % filteredSongs.length;
            return songs.indexOf(filteredSongs[nextFiltered]);
        }

        function playNext() {
            const nextIdx = getNextSongIndex();
            if (nextIdx >= 0) selectSong(nextIdx);
        }

        // ===== Session Presets =====

        function saveSetup() {
            if (currentSongIndex < 0) return;
            const song = songs[currentSongIndex];
            const tag = prompt('Tag name (e.g. Chorus, Hook):') || '';
            const key = (selectedPlaylist || 'all') + '::' + song.dir;
            const seekBar = document.getElementById('seekBar');
            sessionPresets[key] = {
                position: seekBar ? seekBar.value / 1000 : 0,
                volumes: {},
                preset: currentPreset,
                tag: tag
            };
            for (const stem of STEM_NAMES) {
                const sl = document.getElementById('sl-' + stem);
                sessionPresets[key].volumes[stem] = sl ? parseInt(sl.value) : 80;
            }
            localStorage.setItem('beatznbox_presets', JSON.stringify(sessionPresets));
            showPresetIndicator(tag);
        }

        function clearSetup() {
            if (currentSongIndex < 0) return;
            const song = songs[currentSongIndex];
            const key = (selectedPlaylist || 'all') + '::' + song.dir;
            delete sessionPresets[key];
            localStorage.setItem('beatznbox_presets', JSON.stringify(sessionPresets));
            document.getElementById('presetIndicator').textContent = '';
            document.getElementById('clearSetupBtn').style.display = 'none';
        }

        function restoreSetup(preset) {
            if (preset.volumes) {
                for (const [stem, vol] of Object.entries(preset.volumes)) {
                    setStemVol(stem, vol);
                    const sl = document.getElementById('sl-' + stem);
                    if (sl) sl.value = vol;
                }
            }
            if (preset.position > 0) {
                pauseOffset = preset.position * songDuration;
                const seekBar = document.getElementById('seekBar');
                if (seekBar) seekBar.value = preset.position * 1000;
                document.getElementById('currentTime').textContent = formatTime(pauseOffset);
            }
            if (preset.preset) {
                currentPreset = preset.preset;
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById('pre-' + preset.preset);
                if (btn) btn.classList.add('active');
            }
            showPresetIndicator(preset.tag);
        }

        function showPresetIndicator(tag) {
            const el = document.getElementById('presetIndicator');
            if (el) el.textContent = tag ? `Setup saved: "${tag}"` : 'Setup saved';
            const clearBtn = document.getElementById('clearSetupBtn');
            if (clearBtn) clearBtn.style.display = 'inline-block';
        }

        // ===== Helpers =====

        function toggleSection(name) {
            const el = document.getElementById(name + 'Section');
            const arrow = document.getElementById(name + 'Arrow');
            if (el) {
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
                if (arrow) arrow.innerHTML = el.style.display === 'none' ? '&#9660;' : '&#9650;';
            }
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // Init
        loadSongList();
    </script>
</body>
</html>
